name: Docker Stack Deploy

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'build.gradle'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cart
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cart
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PRODUCT_SERVICE_URL: http://product-catalog-service:8080

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: urfu-cake-shop-cart-service
          submodules: recursive

      - name: Checkout cake-core
        uses: actions/checkout@v4
        with:
          repository: URFU-CakeShop/cake-core
          ref: for-notification-service
          path: cake-core
          clean: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: |
          cd urfu-cake-shop-cart-service
          chmod +x gradlew
          ./gradlew test \
            --tests "ru.urfu.cake.shop.cart.service.client.*" \
            --tests "ru.urfu.cake.shop.cart.service.mapper.*" \
            --tests "ru.urfu.cake.shop.cart.service.service.*"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: urfu-cakeshop
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/urfu-cakeshop/cake-shop-cart-service
          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:${GITHUB_SHA::7} \
            -f urfu-cake-shop-cart-service/Dockerfile \
            .

      - name: Push Docker image
        run: |
          IMAGE=ghcr.io/urfu-cakeshop/cake-shop-cart-service
          docker push $IMAGE:latest
          docker push $IMAGE:${GITHUB_SHA::7}
