
services:
  cart-db:
    image: postgres:15-alpine
    container_name: cart-db
    environment:
      POSTGRES_DB: cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d cart" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cake-shop-network

  cart-service:
    build:
      context: ..
      dockerfile: urfu-cake-shop-cart-service/Dockerfile
    container_name: cake-shop-cart-service
    depends_on:
      cart-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-db:5432/cart
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CAKE_KAFKA_STREAMS_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PRODUCT_SERVICE_URL: http://host.docker.internal:8080
    networks:
      - cake-shop-network


networks:
  cake-shop-network:
    external: true
