
services:
  cart-db:
    image: postgres:15-alpine
    container_name: cart-db
    environment:
      POSTGRES_DB: cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d cart" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monitoring
      - cake-shop-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TOOLS_LOG4J_PROP: "INFO,CONSOLE"
    command: >
      bash -c "export KAFKA_OPTS='-Dzookeeper.admin.enableServer=false' && /etc/confluent/docker/run"
    networks:
      - monitoring
      - cake-shop-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ENABLE_KRAFT: "false"
    networks:
      - monitoring
      - cake-shop-network

  cart-service:
    build:
      context: ..
      dockerfile: urfu-cake-shop-cart-service/Dockerfile
    container_name: cake-shop-cart-service
    depends_on:
      cart-db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-db:5432/cart
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CAKE_KAFKA_STREAMS_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PRODUCT_SERVICE_URL: http://product-catalog-service:8080
    networks:
      - monitoring
      - cake-shop-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring
      - cake-shop-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring
      - cake-shop-network

networks:
  monitoring:
    driver: bridge
  cake-shop-network:
    external: true
