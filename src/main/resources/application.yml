spring:
  application:
    name: cake-shop-cart-service
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://localhost:5432/cart
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    contexts: development, production

cake:
  kafka:
    streams:
      application-id: cart-service-streams
      bootstrap-servers: localhost:9092
      num-stream-threads: 2
      topology-logging: true
      dlq:
        enable: true
        topic-suffix: ".DLQ"

management:
  endpoints:
    web:
      exposure:
        include: 'info,prometheus,health'
  metrics:
    export:
      prometheus:
        enabled: true
      distribution:
        percentiles-histogram:
          "[http.server.requests]": true

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF