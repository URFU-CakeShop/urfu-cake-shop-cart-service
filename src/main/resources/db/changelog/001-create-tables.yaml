databaseChangeLog:
  - changeSet:
      id: 1-setup-uuid
      author: Kirill
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

  - changeSet:
      id: 2-create-cart-and-items
      author: Kirill
      changes:
        - createTable:
            tableName: carts
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cart_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart
                    referencedTableName: carts
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: product_variant_id
                  type: UUID
              - column:
                  name: custom_cake_id
                  type: UUID
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: NUMERIC(12, 2)
                  constraints:
                    nullable: false